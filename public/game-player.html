<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — AddGames</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b0f; --surface: #0f1318; --border: #1e2730;
      --accent: #00ff88; --text: #e8edf3; --muted: #4a5568;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; flex-direction: column; }

    /* ── Top bar ── */
    #topbar {
      height: 44px; flex-shrink: 0;
      background: rgba(8,11,15,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
      z-index: 50;
    }

    #homeBtn {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; color: var(--text);
      font-size: 0.85rem; font-weight: 700;
      padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border);
      transition: all 0.15s; flex-shrink: 0;
      background: var(--surface);
    }
    #homeBtn:hover { border-color: var(--accent); color: var(--accent); }

    #gameIcon { font-size: 1.1rem; }
    #gameTitle {
      font-weight: 700; font-size: 0.95rem;
      letter-spacing: -0.02em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    #gameMeta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--muted);
      flex-shrink: 0;
    }

    #fullscreenBtn {
      width: 30px; height: 30px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--muted);
      display: grid; place-items: center; flex-shrink: 0;
      transition: all 0.15s;
    }
    #fullscreenBtn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Frame ── */
    #frameWrap { flex: 1; position: relative; overflow: hidden; }

    #gameFrame {
      width: 100%; height: 100%;
      border: none; display: block;
      background: #fff;
    }

    /* ── Loading / error overlay ── */
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); z-index: 10; gap: 1rem;
      transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #overlayText {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem; color: var(--muted);
    }
    #overlayEmoji { font-size: 3rem; display: none; }

    /* ── 404 ── */
    #notFound {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem; height: 100%;
      text-align: center; padding: 2rem;
    }
    #notFound.show { display: flex; }
    #notFound h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    #notFound p { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; background: var(--accent); color: #000;
      border-radius: 8px; text-decoration: none;
      font-weight: 700; font-size: 0.9rem;
      transition: background 0.15s;
    }
    .btn-back:hover { background: #00e87a; }
  </style>
</head>
<body>
  <div id="topbar">
    <a id="homeBtn" href="/">
      <span>🕹️</span>
      AddGames
    </a>
    <span id="gameIcon"></span>
    <span id="gameTitle">Loading…</span>
    <span id="gameMeta"></span>
    <button id="fullscreenBtn" title="Fullscreen" onclick="toggleFullscreen()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>

  <div id="frameWrap">
    <div id="overlay">
      <div class="spinner"></div>
      <div id="overlayText">Loading game…</div>
    </div>

    <div id="notFound">
      <div style="font-size:4rem">🕹️</div>
      <h2>Game not found</h2>
      <p>// No game at this slug exists.</p>
      <a class="btn-back" href="/">← Browse Games</a>
    </div>

    <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups" allowfullscreen></iframe>
  </div>

  <script src="/src/config.js"></script>
  <script>
  (async () => {
    const slug = location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (!slug || slug === 'index.html') { location.href = '/'; return; }

    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

    const { data: game, error } = await sb
      .from('games')
      .select('*')
      .eq('slug', slug)
      .single();

    if (error || !game) {
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('notFound').classList.add('show');
      document.title = '404 — AddGames';
      return;
    }

    // Update tab title & top bar
    document.title = `${game.icon || '🎮'} ${game.name} — AddGames`;
    document.getElementById('gameIcon').textContent  = game.icon || '🎮';
    document.getElementById('gameTitle').textContent = game.name;
    document.getElementById('gameMeta').textContent  = game.author ? `by ${game.author}` : '';

    // Load game via frame.src directly.
    // index.html đã được inject <base href> lúc upload/import nên tất cả
    // relative assets (CSS, JS, images) tự resolve đúng từ Supabase CDN.
    // KHÔNG dùng srcdoc vì srcdoc iframe bị coi là about:srcdoc origin —
    // <base href> sẽ không load được cross-origin resource (Supabase CDN).
    const frame = document.getElementById('gameFrame');
    frame.src = game.game_url;
    frame.addEventListener('load', () => {
      document.getElementById('overlay').classList.add('hidden');
    });
    setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 8000);
  })();

  function toggleFullscreen() {
    const fw = document.getElementById('frameWrap');
    if (!document.fullscreenElement) {
      fw.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }
  </script>
</body>
</html>
