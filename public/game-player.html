<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… — AddGames</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b0f; --surface: #0f1318; --border: #1e2730;
      --accent: #00ff88; --text: #e8edf3; --muted: #4a5568;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; display: flex; flex-direction: column; }

    #topbar {
      height: 44px; flex-shrink: 0;
      background: rgba(8,11,15,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px; z-index: 50;
    }
    #homeBtn {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; color: var(--text);
      font-size: 0.85rem; font-weight: 700;
      padding: 5px 10px; border-radius: 7px;
      border: 1px solid var(--border);
      transition: all 0.15s; flex-shrink: 0;
      background: var(--surface);
    }
    #homeBtn:hover { border-color: var(--accent); color: var(--accent); }
    #gameIcon { font-size: 1.1rem; }
    #gameTitle {
      font-weight: 700; font-size: 0.95rem;
      letter-spacing: -0.02em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    #gameMeta { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); flex-shrink: 0; }
    #fullscreenBtn {
      width: 30px; height: 30px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--muted);
      display: grid; place-items: center; flex-shrink: 0; transition: all 0.15s;
    }
    #fullscreenBtn:hover { color: var(--text); border-color: var(--muted); }

    #frameWrap { flex: 1; position: relative; overflow: hidden; }
    #gameFrame { width: 100%; height: 100%; border: none; display: block; background: #fff; }

    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); z-index: 10; gap: 1rem; transition: opacity 0.4s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlayText { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--muted); }

    #errorBox {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 1rem; height: 100%;
      text-align: center; padding: 2rem;
    }
    #errorBox.show { display: flex; }
    #errorBox h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
    #errorBox p { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; background: var(--accent); color: #000;
      border-radius: 8px; text-decoration: none;
      font-weight: 700; font-size: 0.9rem; transition: background 0.15s;
    }
    .btn-back:hover { background: #00e87a; }
  </style>
</head>
<body>
  <div id="topbar">
    <a id="homeBtn" href="/"><span>🕹️</span> AddGames</a>
    <span id="gameIcon"></span>
    <span id="gameTitle">Loading…</span>
    <span id="gameMeta"></span>
    <button id="fullscreenBtn" title="Fullscreen" onclick="toggleFullscreen()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>

  <div id="frameWrap">
    <div id="overlay">
      <div class="spinner"></div>
      <div id="overlayText">Loading game…</div>
    </div>

    <div id="errorBox">
      <div style="font-size:4rem">🕹️</div>
      <h2 id="errorTitle">Game not found</h2>
      <p id="errorMsg">// No game at this slug exists.</p>
      <a class="btn-back" href="/">← Browse Games</a>
    </div>

    <!--
      KEY FIX: srcdoc + blob URL approach
      - No allow-same-origin needed (avoids sandbox escape warning)
      - No content-type dependency on Supabase CDN
      - We fetch HTML as text via JS, rewrite asset URLs to absolute,
        then inject via srcdoc — browser renders it as real HTML
    -->
    <iframe id="gameFrame"
      sandbox="allow-scripts allow-forms allow-modals allow-popups allow-pointer-lock"
      allowfullscreen></iframe>
  </div>

  <script src="/src/config.js"></script>
  <script>
  (async () => {
    const slug = location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (!slug || slug === 'index.html') { location.href = '/'; return; }

    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

    function showError(title, msg) {
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorBox').classList.add('show');
      document.title = title + ' — AddGames';
    }

    // 1. Fetch game record from DB
    const { data: game, error } = await sb
      .from('games').select('*').eq('slug', slug).single();

    if (error || !game) {
      showError('Game not found', '// No game at this slug exists.');
      return;
    }

    document.title = `${game.icon || '🎮'} ${game.name} — AddGames`;
    document.getElementById('gameIcon').textContent  = game.icon || '🎮';
    document.getElementById('gameTitle').textContent = game.name;
    document.getElementById('gameMeta').textContent  = game.author ? `by ${game.author}` : '';

    // 2. Compute the base URL for this game's assets in Supabase Storage
    //    e.g. https://xxx.supabase.co/storage/v1/object/public/game-files/slug/
    const gameBaseUrl = game.game_url.replace(/\/index\.html.*$/, '/');

    // 3. Fetch the raw HTML from Supabase Storage
    //    Add cache-bust to bypass Supabase CDN stale cache
    document.getElementById('overlayText').textContent = 'Fetching game…';
    let htmlText;
    try {
      const resp = await fetch(game.game_url + '?t=' + Date.now());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      htmlText = await resp.text();
    } catch (e) {
      showError('Failed to load game', `// Could not fetch game files: ${e.message}`);
      return;
    }

    // 4. Remove any existing <base> tags (may have wrong URL from previous bad uploads)
    htmlText = htmlText.replace(/<base[^>]*>/gi, '');

    // 5. Rewrite all relative asset URLs to absolute Supabase CDN URLs.
    //    This replaces src="css/style.css" → src="https://...supabase.co/.../slug/css/style.css"
    //    Handles: src, href, url() in inline styles
    //    Skips: already-absolute URLs (http/https/data/blob/javascript/mailto)
    //    Skips: hash-only anchors (#section)
    const skipPattern = /^(https?:|data:|blob:|javascript:|mailto:|#|\/\/)/i;

    htmlText = htmlText
      // src="..." and src='...'
      .replace(/\b(src|href)=(["'])(?![\s"'])(.*?)\2/gi, (match, attr, quote, val) => {
        if (skipPattern.test(val.trim())) return match;
        return `${attr}=${quote}${gameBaseUrl}${val}${quote}`;
      })
      // url("...") and url('...') and url(...) in style attributes / <style> blocks
      .replace(/url\((["']?)(?![\s"'])(.*?)\1\)/gi, (match, quote, val) => {
        if (skipPattern.test(val.trim())) return match;
        return `url(${quote}${gameBaseUrl}${val}${quote})`;
      });

    // 6. Inject into iframe via srcdoc — no content-type issues, no CDN cache problems
    document.getElementById('overlayText').textContent = 'Starting game…';
    const frame = document.getElementById('gameFrame');
    frame.srcdoc = htmlText;
    frame.addEventListener('load', () => {
      document.getElementById('overlay').classList.add('hidden');
    }, { once: true });

    // Fallback hide spinner after 10s
    setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 10000);
  })();

  function toggleFullscreen() {
    const fw = document.getElementById('frameWrap');
    if (!document.fullscreenElement) fw.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  }
  </script>
</body>
</html>
